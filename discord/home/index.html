<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Discord Server</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #5865F2, #23272A);
      color: white;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 3em;
    }
    p {
      font-size: 1.2em;
      max-width: 600px;
      margin: auto;
    }
    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: #57F287;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
    footer {
      margin-top: 80px;
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <h1>🔥 My Discord Server 🔥</h1>
  <p>Chill vibes, fun chats, events, and cool people. Join up and be part of the community!</p>
  <a class="btn" href="https://discord.gg/YOURINVITE">Join the Server</a>
</header>

<footer>
  © 2025 My Discord Server
</footer>

</body>
</html>
