<!DOCTYPE html>
<html>
<head>
<title>Silly Little Element Maker</title>

<!-- Pretty styling -->
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: auto;
        padding: 20px;
        background: #fafafa;
    }
    h1 { text-align: center; }
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
        background: white;
    }
    button {
        margin-top: 15px;
        padding: 12px 18px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
        cursor: pointer;
    }
    button:hover { background: #555; }

    /* The element card */
    #card {
        width: 300px;
        margin: 30px auto;
        padding: 20px;
        border-radius: 12px;
        border: 4px solid #222;
        background: white;
        text-align: center;
        display: none;
    }
    #element-symbol {
        font-size: 64px;
        font-weight: bold;
        margin: -10px 0;
    }
    #element-name {
        font-size: 26px;
        margin-bottom: 10px;
    }
    #element-details {
        font-size: 16px;
        text-align: left;
        margin-top: 15px;
    }
</style>

<!-- html2canvas (turns the box into an image) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>
<body>

<h1>Silly Little Element Maker 😈</h1>

<!-- Inputs -->
<label>Element Name</label>
<input id="name">

<label>Symbol (1–3 letters)</label>
<input id="symbol">

<label>Atomic Number</label>
<input id="number" type="number">

<label>Bohr Shells (e.g. 2, 8, 18, 32)</label>
<input id="shells">

<label>Description</label>
<textarea id="desc" rows="4"></textarea>

<button onclick="generateCard()">✨ Make My Silly Element ✨</button>

<!-- Generated element card -->
<div id="card">
    <div id="element-symbol"></div>
    <div id="element-name"></div>
    <div id="element-details"></div>
</div>

<button id="downloadBtn" style="display:none;" onclick="downloadImage()">📥 Download as Image</button>

<script>
function generateCard() {
    let name = document.getElementById("name").value;
    let symbol = document.getElementById("symbol").value;
    let number = document.getElementById("number").value;
    let shells = document.getElementById("shells").value;
    let desc = document.getElementById("desc").value;

    document.getElementById("element-symbol").innerText = symbol;
    document.getElementById("element-name").innerText = name;
    document.getElementById("element-details").innerHTML =
        "<strong>Atomic Number:</strong> " + number + "<br>" +
        "<strong>Bohr Shells:</strong> " + shells + "<br><br>" +
        desc.replace(/\n/g,"<br>");

    document.getElementById("card").style.display = "block";
    document.getElementById("downloadBtn").style.display = "inline-block";
}

function downloadImage() {
    const card = document.getElementById("card");
    html2canvas(card).then(canvas => {
        const link = document.createElement("a");
        link.download = "silly-element.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
