<!DOCTYPE HTML>
<html>
	<head>
		<title>05staff's Community Official Website</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="icon" type="image/png" href="favicon.png">
		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3900804587440734"
     crossorigin="anonymous"></script>
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>
			/* Dark mode styles */
			body.dark-mode {
				background-color: #121212;
				color: #ffffff;
			}

			body.dark-mode a {
				color: #bb86fc;
			}

			.theme-toggle {
				position: fixed;
				top: 10px;
				right: 10px;
				background: #333;
				color: white;
				border: none;
				padding: 10px 15px;
				cursor: pointer;
				border-radius: 5px;
			}

			.theme-toggle:hover {
				background: #555;
			}
		</style>
	</head>
	<body class="is-preload landing">
		<!-- Theme Toggle Button -->
		<button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>

		<audio id="background-music" src="Aria-Math.mp3" autoplay loop></audio>
		<div id="page-wrapper">

			<!-- Header -->
			<header id="header">
				<h1 id="logo"><a href="index.html">05staff's Community</a></h1>
				<nav id="nav">
					<ul>
						<li><a href="index.html">Home</a></li>
						<li>
							<a href="#">LINKS</a>
							<ul>
								<li><a href="left-sidebar.html">Discord Server</a></li>
							</ul>
						</li>
					</ul>
				</nav>
			</header>

			<!-- Banner -->
			<section id="banner">
				<div class="content">
					<header>
						<h2>05staff's Coms Website</h2>
						<p>The Only & Unique Web.</p>
					</header>
					<span class="image"><img src="images/goatedimage.jpg" alt="" /></span>
				</div>
				<a href="#one" class="goto-next scrolly">Next</a>
			</section>

			<!-- Scripts -->
			<script>
				// Check saved theme preference
				if (localStorage.getItem("theme") === "dark") {
					document.body.classList.add("dark-mode");
				}

				function toggleTheme() {
					document.body.classList.toggle("dark-mode");

					// Save preference in localStorage
					if (document.body.classList.contains("dark-mode")) {
						localStorage.setItem("theme", "dark");
					} else {
						localStorage.setItem("theme", "light");
					}
				}
			</script>
	</body>
</html>
