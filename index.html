<!DOCTYPE html>
<html lang="en">
<head>

      <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Layout</title>

  <style>
    /* Basic Reset */
    body, h1, p {
      margin: 0;
      padding: 0;
    }

    /* Page Colors */
    body {
      background-color: #f0f0f0; /* light gray body */
      font-family: Arial, sans-serif;
    }

    /* Header */
    header {
      background-color: #007bff; /* blue */
      color: white;
      padding: 20px;
      text-align: center;
    }

    /* Main Body Area */
    main {
      padding: 20px;
      background-color: #ffffff; /* white */
      margin: 20px;
      border-radius: 8px;
    }

    /* Footer */
    footer {
      background-color: #007bff; /* blue */
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Simple Website</h1>
  </header>

  <main>
    <p>This is the main body content area.  
    You can put anything here!</p>
  </main>

  <footer>
    <p>© 2025 My Website</p>
  </footer>

</body>
</html>
