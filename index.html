<!DOCTYPE html>
<html>
<head>
</title>Element Maker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: auto;
        padding: 20px;
        background: #f0f0f0;
    }
    h1 { text-align: center; }

    input, textarea, select {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #bbb;
        background: white;
        font-size: 16px;
    }

    button {
        margin-top: 15px;
        padding: 12px 18px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
        cursor: pointer;
    }
    button:hover { background: #555; }

    /* Rectangle Element Box */
    #card {
        width: 260px;
        height: 350px;
        margin: 30px auto;
        padding: 15px;
        border-radius: 6px;
        border: 3px solid #111;
        display: none;
        position: relative;
        box-shadow: 0 0 10px #0002;
    }

    #atomic-number {
        position: absolute;
        top: 8px;
        left: 10px;
        font-size: 28px;
        font-weight: bold;
    }

    #atomic-weight {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 18px;
        font-weight: bold;
    }

    #symbol {
        text-align: center;
        margin-top: 60px;
        font-size: 72px;
        font-weight: bold;
    }

    #name {
        text-align: center;
        margin-top: 10px;
        font-size: 24px;
    }

    #bohr {
        text-align: center;
        margin-top: 10px;
        font-size: 16px;
        color: #333;
    }

    #group {
        text-align: center;
        margin-top: 5px;
        font-size: 15px;
        font-weight: bold;
    }

    #description {
        margin-top: 10px;
        font-size: 14px;
        padding: 0 5px;
        text-align: center;
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<h1>Silly Little Element Maker — With Groups!</h1>

<label>Element Name</label>
<input id="elName">

<label>Symbol</label>
<input id="elSymbol">

<label>Atomic Number</label>
<input id="elNumber" type="number">

<label>Atomic Weight</label>
<input id="elWeight" type="number">

<label>Element Group (Family)</label>
<select id="elGroup">
    <option value="none">— None —</option>
    <option value="alkali">Alkali Metal</option>
    <option value="alkaline">Alkaline Earth Metal</option>
</select>

<label>Description</label>
<textarea id="elDesc" rows="4"></textarea>

<button onclick="generateCard()">✨ Make Element ✨</button>

<div id="card">
    <div id="atomic-number"></div>
    <div id="atomic-weight"></div>
    <div id="symbol"></div>
    <div id="name"></div>
    <div id="group"></div>
    <div id="bohr"></div>
    <div id="description"></div>
</div>

<button id="downloadBtn" style="display:none;" onclick="downloadImage()">📥 Download Image</button>

<script>
// Auto Bohr shell calculator
function bohrShells(Z) {
    const capacities = [2, 8, 18, 32, 50, 72, 98]; 
    const labels = ["K","L","M","N","O","P","Q"];

    let shells = [];
    let remaining = Z;

    for (let i = 0; i < capacities.length; i++) {
        if (remaining <= 0) break;

        let used = Math.min(remaining, capacities[i]);
        shells.push(labels[i] + used);
        remaining -= used;
    }
    return shells.join(", ");
}

function generateCard() {
    let name = document.getElementById("elName").value;
    let symbol = document.getElementById("elSymbol").value;
    let number = parseInt(document.getElementById("elNumber").value);
    let weight = document.getElementById("elWeight").value;
    let desc = document.getElementById("elDesc").value;
    let group = document.getElementById("elGroup").value;

    // Fill card text
    document.getElementById("atomic-number").innerText = number;
    document.getElementById("atomic-weight").innerText = weight;
    document.getElementById("symbol").innerText = symbol;
    document.getElementById("name").innerText = name;
    document.getElementById("bohr").innerText = bohrShells(number);
    document.getElementById("description").innerText = desc;

    // Group label text
    let groupText = "";
    let card = document.getElementById("card");

    if (group === "alkali") {
        groupText = "Alkali Metal";
        card.style.background = "#ffdddd"; // light red
    } else if (group === "alkaline") {
        groupText = "Alkaline Earth Metal";
        card.style.background = "#fff6c7"; // light yellow
    } else {
        groupText = "";
        card.style.background = "white";
    }

    document.getElementById("group").innerText = groupText;

    document.getElementById("card").style.display = "block";
    document.getElementById("downloadBtn").style.display = "inline-block";
}

// Download card as PNG
function downloadImage() {
    const card = document.getElementById("card");
    html2canvas(card).then(canvas => {
        const link = document.createElement("a");
        link.download = "element.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
