<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Discord Bot Commands</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .commands {
      max-width: 800px;
      margin: auto;
    }

    .command {
      background: #020617;
      border-left: 4px solid #38bdf8;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    .command-name {
      font-weight: bold;
      color: #7dd3fc;
      font-size: 18px;
    }

    .command-desc {
      margin-top: 5px;
      color: #cbd5f5;
    }

    .usage {
      margin-top: 8px;
      font-family: monospace;
      color: #a5b4fc;
    }
  </style>
</head>
<body>

  <h1>🤖 My Bot Commands</h1>

  <div class="commands">
    <div class="command">
      <div class="command-name">/help</div>
      <div class="command-desc">Shows all available commands.</div>
      <div class="usage">Usage: /help</div>
    </div>

    <div class="command">
      <div class="command-name">/ping</div>
      <div class="command-desc">Checks if the bot is online.</div>
      <div class="usage">Usage: /ping</div>
    </div>

    <div class="command">
      <div class="command-name">/ban</div>
      <div class="command-desc">Bans a user from the server.</div>
      <div class="usage">Usage: /ban @user reason</div>
    </div>
  </div>

</body>
</html>
