<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>New Server Update | 05staff's Server</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Dark/Light Mode Toggle -->
  <button id="theme-toggle">Toggle Mode</button>

  <!-- Header/Nav/Footer Templates -->
  <div id="header-placeholder"></div>
  <div id="nav-placeholder"></div>

 <div class="card">
      <h2>Welcome</h2>
      <p>
        This is my website. I made it with HTML and it looks kinda like Minecraft,
        but with a cleaner theme and better spacing.
      </p>
      <a href="#" class="button">Start Mining</a>
    </div>

    <div class="card">
      <h2>About This Site</h2>
      <p>
        You can put anything here: info about you, a game, a server,
        or just random stuff. but its silly!
      </p>
    </div>


  <div id="footer-placeholder"></div>

  <!-- JS to load templates & theme toggle -->
  <script>
    function loadTemplate(id, url) {
      fetch(url)
        .then(response => response.text())
        .then(data => { document.getElementById(id).innerHTML = data; });
    }

    loadTemplate('header-placeholder', '/templates/header.html');
    loadTemplate('nav-placeholder', '/templates/nav.html');
    loadTemplate('footer-placeholder', '/templates/footer.html');

    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
    });
  </script>

</body>
</html>
