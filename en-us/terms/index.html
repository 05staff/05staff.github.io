<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Rules & Articles | 05staff's Server</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png">

  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://05staff.github.io/fonts/Minecraft.ttf') format('truetype');
    }

    @font-face {
      font-family: 'MinecraftTen';
      src: url('https://05staff.github.io/fonts/MinecraftTen-VGORe.ttf') format('truetype');
    }

    :root {
      --bg-color: #1b1b1b;
      --header-bg: linear-gradient(#3a8f3a, #2e6e2e);
      --header-border: #1f4f1f;
      --nav-bg: #2a2a2a;
      --nav-hover: #333;
      --link-color: #6cff6c;
      --card-bg: #2f2f2f;
      --card-border: #4a4a4a;
      --text-color: white;
      --footer-bg: #111;
      --footer-color: #777;
    }

    .light-mode {
      --bg-color: #f5f5f5;
      --header-bg: linear-gradient(#6fa06f, #8fcf8f);
      --header-border: #4a914a;
      --nav-bg: #e2e2e2;
      --nav-hover: #cfcfcf;
      --link-color: #2a6f2a;
      --card-bg: #ffffff;
      --card-border: #bbbbbb;
      --text-color: #111;
      --footer-bg: #ddd;
      --footer-color: #555;
    }

    /* 🔑 Sticky footer setup */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'MinecraftTen', monospace;
    }

    header {
      background: var(--header-bg);
      padding: 30px;
      text-align: center;
      border-bottom: 6px solid var(--header-border);
    }

    nav {
      background-color: var(--nav-bg);
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: var(--link-color);
      text-decoration: none;
      margin: 0 15px;
      font-size: 12px;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
      flex: 1;
    }

    .card {
      background-color: var(--card-bg);
      border: 4px solid var(--card-border);
      padding: 20px;
      margin-bottom: 30px;
    }

    footer {
      background-color: var(--footer-bg);
      color: var(--footer-color);
      text-align: center;
      padding: 20px;
      font-size: 10px;
    }

    #theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
    }
  </style>
</head>

<body>

<button id="theme-toggle">Toggle Mode</button>

<header>
  <h1>05staff's Server</h1>
  <p>Rules & Articles</p>
</header>

<nav>
  <a href="/en-us/home">Home</a>
  <a href="/en-us/terms">Terms</a>
  <a href="/en-us/articles">Articles</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Server Rules</h2>
    <p>
      1. Be respectful<br>
      2. No cheating<br>
      3. Keep chat appropriate<br>
      4. Have fun
    </p>
  </div>
</div>

<footer>
  Not affiliated with Mojang or Microsoft. Inspired by minecraft.net | © 05staff 2025–Present
</footer>

<script>
  document.getElementById('theme-toggle').onclick = () =>
    document.body.classList.toggle('light-mode');
</script>

</body>
</html>
