<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Articles | 05staff's Server</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png">

  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('https://05staff.github.io/fonts/Minecraft.ttf') format('truetype');
    }

    @font-face {
      font-family: 'MinecraftTen';
      src: url('https://05staff.github.io/fonts/MinecraftTen-VGORe.ttf') format('truetype');
    }

    :root {
      --bg-color: #1b1b1b;
      --header-bg: linear-gradient(#3a8f3a, #2e6e2e);
      --header-border: #1f4f1f;
      --nav-bg: #2a2a2a;
      --link-color: #6cff6c;
      --card-bg: #2f2f2f;
      --card-border: #4a4a4a;
      --text-color: white;
      --footer-bg: #111;
      --footer-color: #777;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'MinecraftTen', monospace;
    }

    header, nav {
      text-align: center;
      padding: 15px;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
      flex: 1;
    }

    .card {
      background-color: var(--card-bg);
      border: 4px solid var(--card-border);
      padding: 20px;
    }

    footer {
      background-color: var(--footer-bg);
      color: var(--footer-color);
      text-align: center;
      padding: 20px;
      font-size: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>05staff's Server</h1>
  <p>Articles</p>
</header>

<nav>
  <a href="/en-us/home">Home</a>
  <a href="/en-us/terms">Terms</a>
  <a href="/en-us/articles">Articles</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Latest Article: New Update!</h2>
    <p>Our server just received a new update with custom blocks and events.</p>
  </div>
</div>

<footer>
  Not affiliated with Mojang or Microsoft. Inspired by minecraft.net | © 05staff 2025–Present
</footer>

</body>
</html>
