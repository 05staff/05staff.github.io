<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ccc;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px;
      background-color: #333;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .nav-buttons button {
      padding: 10px 15px;
      background-color: #555;
      border: none;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-buttons button:hover {
      background-color: #777;
    }

    .content {
      background-color: white;
      width: 600px;
      height: 600px;
      margin: 40px 0;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      scroll-behavior: smooth;
    }

    .section {
      padding: 40px 20px;
      border-bottom: 1px solid #eee;
    }

    .section:last-child {
      border-bottom: none;
    }

    footer {
      width: 100%;
      padding: 20px;
      background-color: #333;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">MyLogo</div>
    <div class="nav-buttons">
      <button onclick="scrollToSection('section1')">Intro</button>
      <button onclick="scrollToSection('section2')">Projects</button>
      <button onclick="scrollToSection('section3')">Contact</button>
    </div>
  </header>

  <div class="content" id="main-content">
    <div id="section1" class="section">
      <h2>Intro</h2>
      <p>Welcome to my cool white square section where I can write stuff!</p>
    </div>
    <div id="section2" class="section">
      <h2>Projects</h2>
      <p>Here I can describe some of my cool projects or games.</p>
    </div>
    <div id="section3" class="section">
      <h2>Contact</h2>
      <p>Put your email, Discord, or other contact info here.</p>
    </div>
  </div>

  <footer>
    &copy; 2025 Your Name — All rights reserved.
  </footer>

  <script>
    function scrollToSection(id) {
      const section = document.getElementById(id);
      if (section) {
        section.scrollIntoView({ behavior: 'smooth' });
      }
    }
  </script>

</body>
</html>
