<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>05staff's Website</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background-color: black;
      font-family: Arial, sans-serif;
    }

    /* Header bar */
    header {
      width: 100%;
      background-color: #111;
      color: white;
      padding: 10px 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .header-button {
      background-color: #222;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.3s;
    }

    .header-button:hover {
      background-color: #444;
    }

    #dvd {
      position: absolute;
      font-size: 40px;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      background-color: transparent;
      user-select: none;
      font-weight: bold;
      transition: color 0.2s ease;
    }

    /* Secret hidden text */
    .secret {
      position: absolute;
      bottom: 5px;
      left: 5px;
      color: black; /* hidden unless highlighted */
      font-size: 14px;
      z-index: 0;
      user-select: text;
    }
  </style>
</head>
<body>

  <!-- Header with buttons -->
  <header>
    <a href="#" class="header-button" target="_blank">Home</a>
    <a href="anotheranotheranotheruselesspagewrittenin.html" class="header-button" target="_blank">Another useless page</a>
    <a href="https://discord.gg/NsqEmNtQyn" class="header-button" target="_blank">Discord</a>
     <a href="terms.html" class="header-button" target="_blank">Terms</a>
    <a href="actualpage.html" class="header-button" target="_blank">Actual Website</a>
  </header>
  

  <!-- Bouncing DVD Text -->
  <div id="dvd">UwU</div> <!-- Change this text -->

  <!-- Hidden secret text -->
  <div class="secret">the first night isn't usually that bad</div>

  <script>
    const dvd = document.getElementById("dvd");

    // ✏️ Change the DVD text here
    dvd.textContent = "nothing is here :)";

    let posX = 100;
    let posY = 100;
    let velX = 2;
    let velY = 2;

    const colors = ["red", "green", "blue", "yellow", "purple", "cyan", "orange", "magenta", "white"];

    function getRandomColor() {
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function animate() {
      const rect = dvd.getBoundingClientRect();
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      let hitWall = false;

      if (posX + rect.width >= screenWidth || posX <= 0) {
        velX *= -1;
        hitWall = true;
      }

      if (posY + rect.height >= screenHeight || posY <= 0) {
        velY *= -1;
        hitWall = true;
      }

      posX += velX;
      posY += velY;

      dvd.style.left = posX + "px";
      dvd.style.top = posY + "px";

      // Change color on bounce
      if (hitWall) {
        dvd.style.color = getRandomColor();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
