---
title: Search
---
<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Search | 05staff</title>
  <link rel="icon" type="image/png" href="/images/favicon-32x32.png">

  <style>
    /* Fonts */
    @font-face {
      font-family: 'Minecraft';
      src: url('https://05staff.github.io/fonts/Minecraft.ttf') format('truetype');
    }

    @font-face {
      font-family: 'MinecraftTen';
      src: url('https://05staff.github.io/fonts/MinecraftTen-VGORe.ttf') format('truetype');
    }

    /* Theme variables */
    :root {
      --bg-color: #1b1b1b;
      --header-bg: linear-gradient(#3a8f3a, #2e6e2e);
      --header-border: #1f4f1f;
      --nav-bg: #2a2a2a;
      --nav-hover: #333;
      --link-color: #6cff6c;
      --card-bg: #2f2f2f;
      --card-border: #4a4a4a;
      --text-color: white;
      --footer-bg: #111;
      --footer-color: #777;
    }

    .light-mode {
      --bg-color: #f5f5f5;
      --header-bg: linear-gradient(#6fa06f, #8fcf8f);
      --header-border: #4a914a;
      --nav-bg: #e2e2e2;
      --nav-hover: #cfcfcf;
      --link-color: #2a6f2a;
      --card-bg: #ffffff;
      --card-border: #bbbbbb;
      --text-color: #111;
      --footer-bg: #ddd;
      --footer-color: #555;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'MinecraftTen', monospace;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--header-bg);
      padding: 30px;
      text-align: center;
      border-bottom: 6px solid var(--header-border);
    }

    nav {
      background-color: var(--nav-bg);
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: var(--link-color);
      text-decoration: none;
      margin: 0 15px;
      font-size: 12px;
    }

    .container {
      padding: 40px;
      max-width: 950px;
      margin: auto;
      flex: 1;
    }

    .card {
      background-color: var(--card-bg);
      border: 4px solid var(--card-border);
      padding: 25px;
      border-radius: 4px;
    }

    h2 {
      font-family: 'Minecraft', monospace;
      margin-top: 0;
    }

    /* 🔍 Search styling (uses your theme) */
    .search-card input {
      width: 100%;
      padding: 12px;
      font-family: 'MinecraftTen', monospace;
      font-size: 12px;
      background-color: var(--nav-bg);
      color: var(--text-color);
      border: 4px solid var(--card-border);
      border-radius: 3px;
      outline: none;
    }

    .search-card input::placeholder {
      color: var(--footer-color);
    }

    .search-card ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    .search-card li {
      padding: 8px;
      border-bottom: 2px solid var(--card-border);
    }

    .search-card a {
      color: var(--link-color);
      text-decoration: none;
      font-size: 12px;
    }

    .search-card a:hover {
      color: var(--text-color);
    }

    footer {
      background-color: var(--footer-bg);
      color: var(--footer-color);
      text-align: center;
      padding: 20px;
      font-size: 10px;
    }

    #theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      padding: 10px;
      font-family: 'MinecraftTen', monospace;
      border: 4px solid var(--header-border);
      background-color: var(--nav-bg);
      color: var(--link-color);
      cursor: pointer;
    }
  </style>
</head>

<body>

<button id="theme-toggle">Toggle Mode</button>

<header>
  <h1>05staff</h1>
  <p>Site Search</p>
</header>

<nav>
  <a href="/en-us/home">Home</a>
  <a href="/en-us/articles">Articles</a>
  <a href="/en-us/server">Server</a>
</nav>

<div class="container">
  <!-- ✅ ONE SEARCH CARD -->
  <div class="card search-card">
    <h2>Search</h2>

    <input
      type="text"
      id="search-input"
      placeholder="Search the site..."
      autocomplete="off"
    >

    <ul id="results-container"></ul>
  </div>
</div>

<footer>
  Copyright 05staff 2025-Present
</footer>

<script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  SimpleJekyllSearch({
    searchInput: document.getElementById('search-input'),
    resultsContainer: document.getElementById('results-container'),
    json: '/search.json',
    searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
    noResultsText: 'No results found'
  });

  document.getElementById('theme-toggle')
    .addEventListener('click', () =>
      document.body.classList.toggle('light-mode')
    );
});
</script>

</body>
</html>
